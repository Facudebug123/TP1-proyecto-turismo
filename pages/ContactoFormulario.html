<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="../styles/FormularioContacto.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <a href="Home.html" title="Inicio">
        <img
          src="../assets/img/Destino Ideal en paraíso tropical.png"
          alt="Logo Turismo"
          class="logo"
        />
      </a>

      <nav class="menu">
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon"> ☰ </label>
        <ul class="menu-items">
          <li><a href="DestinyTour.html" title="Destinos">Destinos</a></li>
          <li><a href="Price.html" title="Precios">Precios</a></li>
        </ul>
      </nav>
    </header>
    <form class="form" action="#exito">
      <label for="" class="query">Consulta</label>
      <textarea placeholder="Mensaje" required minlength="10"></textarea>

      <input type="text" placeholder="Nombre" required minlength="3" />
      <input type="email" placeholder="Email" required />

      <button type="submit">Enviar</button>
    </form>

    <!-- MODAL -->
    <div id="exito" class="modal">
      <div class="modal-content">
        <h2>✅ Enviado correctamente</h2>
        <p>Gracias por contactarte</p>
        <a href="#">Cerrar</a>
      </div>
    </div>
  </body>
</html>
